<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lineage Classic - Real Client UI</title>
    <style>
        /* 1. 클래식 픽셀 폰트 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        }

        :root {
            /* 리니지 클라이언트 특유의 돌/금속 색상표 */
            --bg-stone: #626573;
            --border-light: #9ba0af;
            --border-dark: #2a2c33;
            --slot-bg: #22242a;
            --slot-circle: #2a2c33;
            
            --text-gold: #ffeb99;
            --text-pink: #ff77ff;
            --text-blue: #66ccff;
        }

        body {
            /* 게임 필드 배경을 임시로 흙바닥 색으로 지정 */
            background: #4a3c2c url('https://www.transparenttextures.com/patterns/dirt.png'); 
            font-family: 'DungGeunMo', 'Gulim', sans-serif;
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            user-select: none;
        }

        /* 2. 게임 UI 윈도우 공통 프레임 (돌 질감 테두리) */
        .window {
            background: var(--bg-stone);
            /* 핵심! 입체적인 금속/돌 테두리를 여러 겹의 그림자로 구현 */
            box-shadow: 
                inset 1px 1px 0px #b2b6c7, 
                inset -1px -1px 0px #111,
                inset 2px 2px 0px var(--border-light), 
                inset -2px -2px 0px var(--border-dark),
                5px 5px 15px rgba(0,0,0,0.8);
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }

        /* 상태창 (왼쪽) */
        .status-window {
            top: 20px; left: 20px;
            width: 250px; height: 450px;
            display: flex; flex-direction: column; gap: 8px;
            /* 배경에 사람 실루엣 느낌의 희미한 그라데이션 */
            background: radial-gradient(circle at 70% 60%, rgba(30,35,45,0.4) 0%, transparent 50%), var(--bg-stone);
        }

        .stat-line { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 2px; }
        .stat-title { color: #fff; }
        .stat-val-pink { color: var(--text-pink); }
        .stat-val-blue { color: var(--text-blue); }
        
        .stat-box { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-dark); 
            border-bottom-color: var(--border-light); border-right-color: var(--border-light);
            padding: 2px 6px; text-align: right; width: 40px;
        }

        /* 인벤토리 (오른쪽) */
        .inventory-window {
            top: 20px; right: 20px;
            width: 310px; height: 450px;
        }

        /* 3. 인벤토리 슬롯 (안으로 파인 느낌 + 원형 문양) */
        .inv-grid {
            display: grid; grid-template-columns: repeat(5, 54px); grid-template-rows: repeat(6, 54px);
            gap: 2px; background: var(--border-dark); padding: 3px; margin-top: 10px;
            border-top: 1px solid #111; border-left: 1px solid #111;
            border-bottom: 1px solid #999; border-right: 1px solid #999;
        }

        .slot {
            width: 54px; height: 54px;
            background: var(--slot-bg);
            /* 슬롯 배경의 동그란 룬 문양 느낌 */
            background-image: radial-gradient(circle, var(--slot-circle) 35%, transparent 40%);
            border-top: 2px solid #0a0b0c; border-left: 2px solid #0a0b0c;
            border-bottom: 2px solid #484b55; border-right: 2px solid #484b55;
            position: relative; display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        
        .slot:hover { border-color: #888; }
        .slot.active-scroll { border: 2px solid var(--text-gold); box-shadow: inset 0 0 10px rgba(255,235,153,0.3); }

        .slot img { width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; pointer-events: none; }
        .lvl-text { position: absolute; top: 2px; left: 4px; color: #44ff44; font-size: 13px; font-weight: bold; }
        .qty-text { position: absolute; bottom: 2px; right: 4px; color: #fff; font-size: 12px; }

        /* 하단 채팅창 (화면 맨 아래) */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to bottom, #1a1c22, #0d0f12);
            border-top: 3px solid #b2b6c7;
            display: flex; flex-direction: column;
        }

        .chat-log {
            flex-grow: 1; padding: 10px 20px; color: #ccc; font-size: 14px;
            line-height: 1.5; overflow-y: hidden; text-shadow: 1px 1px 0 #000;
        }
        
        .sys-msg { color: var(--text-gold); }

        /* 테스트용 상단 보급 버튼 (게임과 안 어울리지만 테스트용으로 작게 배치) */
        .test-tools { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: #000; padding: 5px; z-index: 999; border-bottom: 1px solid #444; }
        .test-tools button { font-family: 'DungGeunMo'; font-size: 12px; padding: 2px 5px; cursor: pointer; background: #333; color: #fff; border: 1px solid #666; }

    </style>
</head>
<body id="gameBody">

    <div class="test-tools">
        <button onclick="giveItem('w', 0)">장검 획득</button>
        <button onclick="giveItem('a', 0)">판금 획득</button>
        <button onclick="giveItem('s', 0)">데이 10장</button>
        <button onclick="giveItem('s', 1)">축데이 10장</button>
    </div>

    <div class="window status-window">
        <div class="stat-line"><span>Level</span><span class="stat-box">1</span></div>
        <div style="height:2px; background:var(--border-dark); margin:5px 0;"></div>
        
        <div class="stat-line"><span class="stat-title">Hit Point</span><span class="stat-val-pink">14/14</span></div>
        <div class="stat-line"><span class="stat-title">Mana Point</span><span class="stat-val-blue">2/2</span></div>
        <div class="stat-line"><span class="stat-title">Armor Class</span><span>10</span></div>
        
        <div style="margin-top:20px;">
            <div class="stat-line" style="width:100px;"><span>Str</span><span class="stat-box">20</span></div>
            <div class="stat-line" style="width:100px;"><span>Dex</span><span class="stat-box">10</span></div>
            <div class="stat-line" style="width:100px;"><span>Con</span><span class="stat-box">11</span></div>
            <div class="stat-line" style="width:100px;"><span>Int</span><span class="stat-box">10</span></div>
            <div class="stat-line" style="width:100px;"><span>Wis</span><span class="stat-box">11</span></div>
            <div class="stat-line" style="width:100px;"><span>Cha</span><span class="stat-box">13</span></div>
        </div>
    </div>

    <div class="window inventory-window">
        <div class="inv-grid" id="invGrid"></div>
    </div>

    <div class="bottom-bar">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg">도움말을 보려면 CTRL-H 를 눌러 주십시오.</div>
            <div class="sys-msg">게임마스터는 고객님께 개인 정보(비밀번호 등)를 절대 묻지 않습니다.</div>
            <div><span style="color:#aaa;">테스트 서버:</span> 인챈트 시뮬레이션에 오신 것을 환영합니다! 주문서를 더블클릭 하세요.</div>
        </div>
    </div>

<script>
    // LCInfo 이미지 프록시
    const getLCImg = (path) => `https://images.weserv.nl/?url=https://www.lcinfo.io${path}`;

    const db = {
        w: [ { name: "싸울아비 장검", safe: 6, img: getLCImg("/static/images/items/4.png"), target: 'w', stack: false } ],
        a: [ { name: "판금 갑옷", safe: 4, img: getLCImg("/static/images/items/35.png"), target: 'a', stack: false } ],
        s: [ 
            { name: "무기 마법 주문서", sType: 'n', target: 'w', img: getLCImg("/static/images/items/154.png"), stack: true },
            { name: "축복받은 무기 마법 주문서", sType: 'b', target: 'w', img: getLCImg("/static/images/items/155.png"), stack: true }
        ]
    };

    let inv = Array(30).fill(null); // 스크린샷과 동일하게 30칸 설정
    let activeIdx = null;

    function giveItem(type, idx) {
        const item = db[type][idx];
        const qty = type === 's' ? 10 : 1; // 주문서는 10개씩 줌

        if (item.stack) {
            let exist = inv.findIndex(s => s && s.name === item.name);
            if (exist !== -1) inv[exist].qty += qty;
            else {
                let empty = inv.findIndex(s => s === null);
                if (empty !== -1) inv[empty] = { ...item, qty: qty };
            }
        } else {
            let empty = inv.findIndex(s => s === null);
            if (empty !== -1) inv[empty] = { ...item, lvl: 0, qty: 1 };
        }
        render();
    }

    function render() {
        const grid = document.getElementById('invGrid');
        grid.innerHTML = inv.map((item, i) => {
            if(!item) return `<div class="slot"></div>`;
            const isSel = activeIdx === i ? 'active-scroll' : '';
            return `
                <div class="slot ${isSel}" onclick="clickItem(${i})" ondblclick="dblClickItem(${i})">
                    <img src="${item.img}" onerror="this.style.display='none'">
                    ${item.lvl !== undefined ? `<div class="lvl-text">+${item.lvl}</div>` : ''}
                    ${item.qty > 1 ? `<div class="qty-text">${item.qty}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function dblClickItem(i) {
        const item = inv[i];
        if(item && item.stack) {
            activeIdx = i;
            addChat(`[${item.name}] 사용할 아이템을 선택해 주십시오.`, 'sys-msg');
            render();
        }
    }

    function clickItem(i) {
        const item = inv[i];
        if (activeIdx !== null) {
            if (activeIdx === i) { activeIdx = null; render(); return; }
            if (item && !item.stack && item.target === inv[activeIdx].target) {
                enchant(activeIdx, i);
            } else {
                addChat("아무일도 일어나지 않았습니다.");
                activeIdx = null; render();
            }
        }
    }

    function enchant(si, ti) {
        const scroll = inv[si];
        const target = inv[ti];
        const chance = target.lvl < target.safe ? 1.0 : 0.33;

        addChat(`강렬한 빛이 +${target.lvl} ${target.name}에 스며듭니다...`);

        if (Math.random() < chance) {
            let up = 1;
            if (scroll.sType === 'b') {
                if (target.lvl <= 2) up = Math.floor(Math.random()*3)+1;
                else if (target.lvl <= 5) up = Math.floor(Math.random()*2)+1;
            }
            target.lvl += up;
            setTimeout(() => addChat(`+${target.lvl} ${target.name}이(가) 푸른 빛을 내뿜습니다.`, 'sys-msg'), 500);
        } else {
            setTimeout(() => addChat(`콰광! +${target.lvl} ${target.name}이(가) 증발하여 사라졌습니다.`, 'sys-msg'), 500);
            inv[ti] = null;
        }
        
        scroll.qty -= 1;
        if (scroll.qty <= 0) inv[si] = null;
        
        activeIdx = null;
        render();
    }

    function addChat(msg, cls = "") {
        const log = document.getElementById('chatLog');
        const div = document.createElement('div');
        div.className = cls; div.innerText = msg;
        log.appendChild(div);
        
        // 메시지가 쌓이면 위로 밀려 올라가는 효과 (최대 5줄 유지)
        if(log.children.length > 5) log.removeChild(log.firstChild);
    }

    render();
</script>
</body>
</html>
