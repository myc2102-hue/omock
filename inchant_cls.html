<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lineage Classic Enchant Simulator</title>
    <style>
        body { background-color: #0b0c0d; color: #d1d1d1; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: #1a1c1e; border: 2px solid #3c3f41; padding: 20px; border-radius: 10px; width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .item-display { height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #2a2c2e; margin-bottom: 20px; background: radial-gradient(circle, #2c2f33 0%, #1a1c1e 100%); }
        .item-icon { width: 64px; height: 64px; margin-bottom: 10px; transition: transform 0.1s; }
        .item-name { font-size: 1.2rem; font-weight: bold; color: #e0bb40; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #3e4449; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #5a6268; }
        .btn-blessed { color: #5bc0de; border-color: #46b8da; }
        .btn-cursed { color: #d9534f; border-color: #d43f3a; }
        #log { margin-top: 20px; height: 100px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.85rem; text-align: left; border: 1px solid #333; }
        .success { color: #44ff44; }
        .fail { color: #ff4444; }
        .system { color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div class="item-display" id="itemBox">
        <img id="itemIcon" src="https://image.plaync.com.s3.amazonaws.com/lineage/powerbook/item/1.png" class="item-icon" alt="아이템">
        <div class="item-name" id="itemName">+0 일본도</div>
    </div>

    <div class="controls">
        <button onclick="enchant('normal')">일반 데이</button>
        <button onclick="enchant('blessed')" class="btn-blessed">축복 데이</button>
        <button onclick="enchant('cursed')" class="btn-cursed">저주 데이</button>
        <button onclick="reset()">초기화</button>
    </div>

    <div id="log"></div>
    <div style="margin-top:10px; font-size: 0.7rem; color: #666;">BGM: 리니지 메인 테마</div>
</div>

<audio id="bgm" loop>
    <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=... (리니지 BGM URL)" type="audio/mpeg">
</audio>
<audio id="soundSuccess"><source src="https://action-v1.pwn.sh/s/success.mp3" type="audio/mpeg"></audio>
<audio id="soundFail"><source src="https://action-v1.pwn.sh/s/fail.mp3" type="audio/mpeg"></audio>

<script>
    let currentLvl = 0;
    const safeLimit = 6;
    const itemNameStr = "일본도";
    const bgm = document.getElementById('bgm');

    // 첫 클릭 시 BGM 재생 (브라우저 정책 대응)
    document.body.addEventListener('click', () => { if(bgm.paused) bgm.play(); }, { once: true });

    function addLog(msg, type) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = type;
        div.innerText = `> ${msg}`;
        log.prepend(div);
    }

    function enchant(type) {
        if (currentLvl === -1) return; // 파괴된 상태

        const icon = document.getElementById('itemIcon');
        icon.style.transform = "scale(1.2)";
        setTimeout(() => icon.style.transform = "scale(1)", 100);

        if (type === 'cursed') {
            if (currentLvl > 0) currentLvl--;
            addLog(`저주받은 기운이 맴돕니다. (-1)`, 'system');
            updateDisplay();
            return;
        }

        // NC 확률 로직: 안전구간 100%, 이후 약 33%
        const successRate = currentLvl < safeLimit ? 1.0 : 0.33;
        const isSuccess = Math.random() < successRate;

        if (isSuccess) {
            let increase = 1;
            if (type === 'blessed') {
                if (currentLvl <= 2) increase = Math.floor(Math.random() * 3) + 1; // +1~3
                else if (currentLvl <= 5) increase = Math.floor(Math.random() * 2) + 1; // +1~2
            }
            currentLvl += increase;
            document.getElementById('soundSuccess').play();
            addLog(`강화 성공! (+${increase} 상승)`, 'success');
        } else {
            currentLvl = -1;
            document.getElementById('soundFail').play();
            addLog(`강렬한 빛이 발생하지만 아이템이 사라졌습니다.`, 'fail');
        }
        updateDisplay();
    }

    function updateDisplay() {
        const nameTag = document.getElementById('itemName');
        const icon = document.getElementById('itemIcon');
        
        if (currentLvl === -1) {
            nameTag.innerText = "파괴됨";
            nameTag.style.color = "#ff4444";
            icon.style.filter = "grayscale(100%) opacity(0.3)";
        } else {
            nameTag.innerText = `+${currentLvl} ${itemNameStr}`;
            nameTag.style.color = "#e0bb40";
            icon.style.filter = "none";
        }
    }

    function reset() {
        currentLvl = 0;
        addLog("새 아이템을 준비했습니다.", "system");
        updateDisplay();
    }
</script>

</body>
</html>
