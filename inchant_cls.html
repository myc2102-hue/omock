<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lineage Classic Final Simulator</title>
    <style>
        :root {
            --bg: #0b0c0d; --panel: #25272b; --slot: #121417;
            --border: #45484d; --gold: #e0bb40; --green: #44ff44;
        }

        body {
            background: var(--bg); color: #ccc; font-family: 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
            user-select: none; -webkit-user-drag: none;
        }

        /* 관리자 보급창 */
        .admin-bar {
            background: #1a1b1e; border: 2px solid var(--border); padding: 15px;
            display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        select, input, button {
            background: #000; color: #fff; border: 1px solid #555; padding: 8px; font-size: 0.9rem;
        }

        button { cursor: pointer; color: var(--gold); font-weight: bold; background: #333; }
        button:hover { background: #444; }

        /* 메인 UI 레이아웃 */
        .main-container { display: flex; gap: 20px; }

        /* 인벤토리 UI */
        .inv-wrapper {
            background: #34373c; border: 3px double #555; padding: 10px;
            box-shadow: inset 2px 2px 5px #000;
        }

        .inv-grid {
            display: grid; grid-template-columns: repeat(4, 56px);
            grid-template-rows: repeat(6, 56px); gap: 4px; background: #111; padding: 5px;
        }

        .slot {
            width: 56px; height: 56px; background: var(--slot); border: 1px solid #333;
            position: relative; display: flex; justify-content: center; align-items: center;
        }

        .slot img { width: 40px; height: 40px; image-rendering: pixelated; }
        .slot:hover { border-color: #888; }
        .slot.active-scroll { border: 2px solid var(--gold); background: #2a2515; }

        .lvl-text {
            position: absolute; top: 2px; left: 4px; color: var(--green);
            font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        /* 로그창 */
        .side-panel { width: 260px; display: flex; flex-direction: column; gap: 10px; }
        #status { background: #000; border: 1px solid #444; padding: 10px; color: var(--gold); font-size: 0.85rem; min-height: 40px; }
        #log {
            flex-grow: 1; background: #050505; border: 1px solid #333; padding: 10px;
            font-size: 0.8rem; overflow-y: auto; height: 300px; line-height: 1.5; color: #aaa;
        }

        .s-suc { color: #50fa7b; } .s-fail { color: #ff5555; } .s-sys { color: #8be9fd; }
        body.mode-target { cursor: crosshair; }
    </style>
</head>
<body id="b">

    <div class="admin-bar">
        <span style="color:var(--gold); font-weight:bold;">[ITEM SHOP]</span>
        <select id="type" onchange="updateList()">
            <option value="w">무기류</option>
            <option value="a">방어구류</option>
            <option value="s">주문서</option>
        </select>
        <select id="items"></select>
        <input type="number" id="amt" value="1" min="1" max="10" style="width:40px;">
        <button onclick="give()">지급받기</button>
    </div>

    <div class="main-container">
        <div class="inv-wrapper">
            <div style="font-size:11px; color:#777; margin-bottom:5px; text-align:center;">INVENTORY</div>
            <div class="inv-grid" id="grid"></div>
        </div>

        <div class="side-panel">
            <div id="status">아이템을 보급받으세요.</div>
            <div id="log"></div>
            <button onclick="location.reload()" style="font-size:11px; color:#666;">데이터 초기화</button>
        </div>
    </div>

<script>
    // --- 고정 이미지 에셋 (차단되지 않는 오픈 주소) ---
    const ASSETS = {
        sword: "https://img.icons8.com/color/96/sword.png",
        armor: "https://img.icons8.com/color/96/armor.png",
        w_scroll: "https://img.icons8.com/color/96/parchment.png",
        a_scroll: "https://img.icons8.com/color/96/scroll.png",
        b_effect: "🌟"
    };

    const db = {
        w: [
            { name: "싸울아비 장검", safe: 6, img: ASSETS.sword, type: 'w' },
            { name: "레이피어", safe: 6, img: ASSETS.sword, type: 'w' },
            { name: "집행검", safe: 0, img: ASSETS.sword, type: 'w' }
        ],
        a: [
            { name: "판금 갑옷", safe: 4, img: ASSETS.armor, type: 'a' },
            { name: "요정족 판금", safe: 6, img: ASSETS.armor, type: 'a' },
            { name: "마법 망토", safe: 4, img: ASSETS.armor, type: 'a' }
        ],
        s: [
            { name: "무기 주문서", target: 'w', sType: 'n', img: ASSETS.w_scroll, type: 's' },
            { name: "축복 무기 주문서", target: 'w', sType: 'b', img: ASSETS.w_scroll, type: 's' },
            { name: "갑옷 주문서", target: 'a', sType: 'n', img: ASSETS.a_scroll, type: 's' },
            { name: "축복 갑옷 주문서", target: 'a', sType: 'b', img: ASSETS.a_scroll, type: 's' }
        ]
    };

    let inv = Array(24).fill(null);
    let activeIdx = null;

    function updateList() {
        const t = document.getElementById('type').value;
        const s = document.getElementById('items');
        s.innerHTML = db[t].map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }

    function give() {
        const t = document.getElementById('type').value;
        const i = document.getElementById('items').value;
        const a = parseInt(document.getElementById('amt').value);
        const item = db[t][i];

        for(let k=0; k<a; k++) {
            const empty = inv.findIndex(s => s === null);
            if(empty === -1) break;
            inv[empty] = { ...item, lvl: t === 's' ? null : 0 };
        }
        addLog(`${item.name} ${a}개 획득`, "s-sys");
        draw();
    }

    function draw() {
        const g = document.getElementById('grid');
        g.innerHTML = inv.map((item, i) => {
            if(!item) return `<div class="slot"></div>`;
            const isSel = activeIdx === i ? 'active-scroll' : '';
            return `
                <div class="slot ${isSel}" onclick="clickSlot(${i})">
                    <img src="${item.img}">
                    ${item.lvl !== null ? `<div class="lvl-text">+${item.lvl}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function clickSlot(i) {
        const item = inv[i];
        if(!item) return;

        if (activeIdx !== null) {
            const scroll = inv[activeIdx];
            if (item.type === scroll.target) {
                enchant(activeIdx, i);
            } else {
                addLog("대상이 올바르지 않습니다.", "s-fail");
                cancel();
            }
        } else if (item.type === 's') {
            activeIdx = i;
            document.getElementById('b').classList.add('mode-target');
            document.getElementById('status').innerText = `[${item.name}]\n대상을 선택하세요.`;
            draw();
        }
    }

    function enchant(si, ti) {
        const scroll = inv[si];
        const target = inv[ti];
        const chance = target.lvl < target.safe ? 1.0 : 0.33;

        if (Math.random() < chance) {
            let up = 1;
            if (scroll.sType === 'b') {
                if (target.lvl <= 2) up = Math.floor(Math.random()*3)+1;
                else if (target.lvl <= 5) up = Math.floor(Math.random()*2)+1;
            }
            target.lvl += up;
            addLog(`강화 성공: +${target.lvl} ${target.name}`, "s-suc");
        } else {
            addLog(`강화 실패: +${target.lvl} ${target.name} 증발`, "s-fail");
            inv[ti] = null;
        }
        inv[si] = null;
        cancel();
    }

    function cancel() {
        activeIdx = null;
        document.getElementById('b').classList.remove('mode-target');
        document.getElementById('status').innerText = "아이템을 선택하세요.";
        draw();
    }

    function addLog(m, c) {
        const l = document.getElementById('log');
        l.innerHTML = `<div class="${c}">> ${m}</div>` + l.innerHTML;
    }

    updateList(); draw();
</script>
</body>
</html>
