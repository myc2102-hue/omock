<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage Classic - Final Real Image Edition</title>
    <style>
        /* 기존 CSS 100% 동일 유지 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        }

        :root {
            --bg-stone: #626573; --border-light: #9ba0af; --border-dark: #2a2c33;
            --slot-bg: #22242a; --slot-circle: #2a2c33;
            --gold: #ffeb99; --green: #44ff44; --red: #ff5555; --blue: #66ccff; --pink: #ff77ff;
        }

        body {
            background: #2a2218 url('https://www.transparenttextures.com/patterns/dirt.png'); 
            font-family: 'DungGeunMo', 'Gulim', sans-serif;
            margin: 0; padding: 20px 10px; color: #ccc; user-select: none;
            display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box;
        }

        .app-container { width: 100%; max-width: 880px; display: flex; flex-direction: column; gap: 20px; }

        .window {
            background: var(--bg-stone);
            box-shadow: 
                inset 1px 1px 0px #b2b6c7, inset -1px -1px 0px #111,
                inset 2px 2px 0px var(--border-light), inset -2px -2px 0px var(--border-dark),
                5px 5px 15px rgba(0,0,0,0.8);
            border-radius: 8px; padding: 12px; color: #fff; text-shadow: 1px 1px 0 #000;
        }

        .admin-bar { display: flex; gap: 10px; align-items: center; justify-content: space-between; background: linear-gradient(135deg, #2b2e33, #15171a); }
        .admin-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        select, input, button { background: #111; color: #fff; border: 1px solid #555; padding: 6px; font-family: inherit; font-size: 14px; }
        button { cursor: pointer; color: var(--gold); background: #222; }
        button:hover { background: #333; }

        .main-content { display: flex; gap: 20px; align-items: stretch; }

        .inventory-window { flex-shrink: 0; width: 300px; display: flex; flex-direction: column; }
        #status { font-size: 13px; color: var(--gold); text-align: center; margin-bottom: 5px; height: 15px; }

        .inv-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px;
            background: var(--border-dark); padding: 3px;
            border-top: 1px solid #111; border-left: 1px solid #111;
            border-bottom: 1px solid #999; border-right: 1px solid #999;
        }

        .slot {
            aspect-ratio: 1 / 1; background: var(--slot-bg);
            background-image: radial-gradient(circle, var(--slot-circle) 35%, transparent 40%);
            border-top: 2px solid #0a0b0c; border-left: 2px solid #0a0b0c;
            border-bottom: 2px solid #484b55; border-right: 2px solid #484b55;
            position: relative; display: flex; justify-content: center; align-items: center; cursor: grab;
        }
        .slot:active { cursor: grabbing; }
        .slot img { width: 80%; height: 80%; object-fit: contain; image-rendering: pixelated; pointer-events: none; }
        .slot:hover { border-color: #888; }
        .slot.active-scroll { border: 2px solid var(--gold); box-shadow: inset 0 0 10px rgba(255,235,153,0.3); }
        .slot.drag-over { border: 2px dashed #8be9fd; opacity: 0.7; }
        body.mode-target .slot { cursor: crosshair; }

        .lvl-text { position: absolute; top: 2px; left: 4px; color: var(--green); font-size: 14px; text-shadow: 1px 1px 0 #000; z-index: 10; pointer-events: none; }
        .count-text { position: absolute; bottom: 2px; right: 4px; color: #fff; font-size: 12px; text-shadow: 1px 1px 0 #000; z-index: 10; pointer-events: none; }

        .chat-window { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-stone); padding: 12px; gap: 4px; }
        .chat-tabs { display: flex; gap: 2px; margin-bottom: 2px; }
        .chat-tab { background: linear-gradient(to bottom, #5d6166, #2a2c33); border: 1px solid #111; border-top: 1px solid #9ba0af; border-left: 1px solid #9ba0af; padding: 4px 12px; font-size: 12px; color: #aaa; cursor: pointer; border-top-left-radius: 4px; border-top-right-radius: 4px; }
        .chat-tab.active { background: #000; color: var(--gold); border-bottom: 1px solid #000; }
        
        #log {
            flex-grow: 1; padding: 10px; font-size: 14px; line-height: 1.6; overflow-y: auto; text-shadow: 1px 1px 0 #000; 
            height: 380px; max-height: 380px; 
            background: #000; border-top: 2px solid #050505; border-left: 2px solid #050505; border-bottom: 2px solid #444; border-right: 2px solid #444;
        }
        #log::-webkit-scrollbar { width: 16px; }
        #log::-webkit-scrollbar-track { background: #111; border-left: 1px solid #333; }
        #log::-webkit-scrollbar-thumb { background: #3a3d42; border-top: 2px solid #666; border-left: 2px solid #666; border-bottom: 2px solid #000; border-right: 2px solid #000; }
        #log::-webkit-scrollbar-thumb:active { background: #222; }

        .chat-input-wrapper { display: flex; align-items: center; background: #000; border-top: 2px solid #050505; border-left: 2px solid #050505; border-bottom: 2px solid #444; border-right: 2px solid #444; padding: 2px; margin-top: 2px; }
        .chat-type-label { color: #aaa; font-size: 13px; padding: 0 8px; border-right: 1px solid #333; }
        .chat-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 6px 8px; font-family: inherit; font-size: 14px; outline: none; text-shadow: 1px 1px 0 #000; }

        .s-suc { color: var(--green); } .s-fail { color: var(--red); } .s-cur { color: var(--blue); } .s-sys { color: var(--gold); }

        .item-popup {
            display: none; position: fixed; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #555; color: #ccc; padding: 10px; font-size: 13px;
            z-index: 9999; pointer-events: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            line-height: 1.6; min-width: 150px;
        }
        .item-popup .p-title { color: var(--gold); font-size: 15px; margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .item-popup .p-safe { color: #aaa; }

        /* ==========================================
           새로 추가된 하단 크레딧 영역 스타일
           ========================================== */
        .credits-section {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin-top: 10px;
            line-height: 1.6;
            text-shadow: 1px 1px 0 #000;
        }
        .credits-section span { color: var(--gold); }
        
        @media (max-width: 430px) {
            body { padding: 10px; } .app-container { gap: 10px; }
            .admin-bar, .admin-controls { flex-direction: column; align-items: stretch; }
            .admin-controls select, .admin-controls input, .admin-controls button { width: 100%; box-sizing: border-box; }
            .main-content { flex-direction: column; gap: 10px; } .inventory-window { width: 100%; } 
            .chat-window { height: auto; } 
            #log { height: 200px; max-height: 200px; } 
        }
    </style>
</head>
<body id="b">

    <audio id="soundDrop" src="https://actions.google.com/sounds/v1/foley/drop_leather.ogg"></audio>

    <div id="itemPopup" class="item-popup window"></div>

    <div class="app-container">
        <div class="admin-bar window">
            <span style="color:var(--gold); font-weight:bold;">[ITEM SHOP]</span>
            <div class="admin-controls">
                <select id="type" onchange="updateList()"></select>
                <select id="items"></select>
                <input type="number" id="amt" value="1" min="1" max="99" placeholder="수량">
                <button onclick="give()">지급</button>
                <button onclick="location.reload()">초기화</button>
            </div>
        </div>

        <div class="main-content">
            <div class="inventory-window window">
                <div id="status">주문서를 더블클릭 하십시오.</div>
                <div class="inv-grid" id="grid"></div>
            </div>

            <div class="chat-window window">
                <div class="chat-tabs">
                    <div class="chat-tab active">전체</div><div class="chat-tab">혈맹</div><div class="chat-tab">파티</div><div class="chat-tab">장사</div>

                <div id="log">
                    <div class="s-sys">도움말을 보려면 CTRL-H 를 눌러 주십시오.</div>
                    <div class="s-sys">아이템을 꾹 누르면 상세 정보가 표시됩니다.</div>
                </div>
                <div class="chat-input-wrapper">
                    <span class="chat-type-label">일반</span>
                    <input type="text" class="chat-input" placeholder="채팅을 입력할 수 없습니다." readonly>
                </div>
            </div>
        </div>

        <div class="credits-section">
            리니지클래식 어레인서버 ID: <span>데포로쥬</span> 문의<br>
            개발자 커피사주기 <span>농협3020780286881 문x철</span>
        </div>
    </div>

<script>
    const ASSET_SERVER = "https://raw.githubusercontent.com/run-to-the-future/lineage-assets/main/icon/";
    const getLCImg = (id) => `${ASSET_SERVER}${id}.png`;

    // 요청하신 신규 기본 지급 아이템들을 db 배열에 추가했습니다.
    const db = {
        "무기": [
            { name: "일본도", safe: 6, img: getLCImg(1), target: 'w', stackable: false, info: ["타격치: 10/12", "안전 인챈트: 6", "클래스: 기사, 요정, 군주"] },
            { name: "레이피어", safe: 6, img: getLCImg(3), target: 'w', stackable: false, info: ["타격치: 11/6", "추가 타격: 언데드", "안전 인챈트: 6"] },
            { name: "다마스커스 검", safe: 6, img: getLCImg(6), target: 'w', stackable: false, info: ["타격치: 10/11", "특징: 손상되지 않음", "안전 인챈트: 6"] },
            { name: "메일 브레이커", safe: 6, img: getLCImg(15), target: 'w', stackable: false, info: ["타격치: 4/5", "명중률: +10", "특징: 손상되지 않음", "안전 인챈트: 6"] },
            { name: "싸울아비 장검", safe: 6, img: getLCImg(4), target: 'w', stackable: false, info: ["타격치: 16/10", "안전 인챈트: 6", "클래스: 기사"] },
            { name: "붉은 기사의 대검", safe: 6, img: getLCImg(62), target: 'w', stackable: false, info: ["타격치: 14/16", "옵션: STR +1", "특징: 양손 무기", "안전 인챈트: 6"] },
            { name: "오리하르콘 단검", safe: 6, img: getLCImg(7), target: 'w', stackable: false, info: ["타격치: 7/7", "추가 타격: 언데드", "손상되지 않음", "안전 인챈트: 6"] },
            { name: "마나의 지팡이", safe: 6, img: getLCImg(110), target: 'w', stackable: false, info: ["타격치: 3/3", "옵션: MP 흡수", "클래스: 마법사", "안전 인챈트: 6"] },
            { name: "힘의 지팡이", safe: 6, img: getLCImg(111), target: 'w', stackable: false, info: ["타격치: 9/9", "옵션: STR +3", "클래스: 마법사", "안전 인챈트: 6"] },
            { name: "요정족 창", safe: 6, img: getLCImg(80), target: 'w', stackable: false, info: ["타격치: 7/7", "특징: 양손 무기", "안전 인챈트: 6"] },
            { name: "은장검", safe: 6, img: getLCImg(12), target: 'w', stackable: false, info: ["타격치: 8/12", "추가 타격: 언데드", "안전 인챈트: 6"] }
        ],
        "방어구": [
            { name: "기사의 면갑", safe: 4, img: getLCImg(65), target: 'a', stackable: false, info: ["방어력: -3", "안전 인챈트: 4", "클래스: 기사"] },
            { name: "티셔츠", safe: 4, img: getLCImg(30), target: 'a', stackable: false, info: ["방어력: 0", "안전 인챈트: 4", "클래스: 전체"] },
            { name: "요정족 방패", safe: 6, img: getLCImg(49), target: 'a', stackable: false, info: ["방어력: -2", "안전 인챈트: 6", "클래스: 요정"] },
            { name: "강철 부츠", safe: 4, img: getLCImg(17), target: 'a', stackable: false, info: ["방어력: -3", "안전 인챈트: 4", "클래스: 전체"] },
            { name: "파워 글로브", safe: 4, img: getLCImg(54), target: 'a', stackable: false, info: ["방어력: 0", "옵션: STR +2", "안전 인챈트: 4", "클래스: 전체"] },
            { name: "보호 망토", safe: 4, img: getLCImg(114), target: 'a', stackable: false, info: ["방어력: -3", "안전 인챈트: 4", "클래스: 전체"] },
            { name: "무명 로브", safe: 4, img: getLCImg(20), target: 'a', stackable: false, info: ["방어력: -2", "안전 인챈트: 4", "클래스: 마법사"] },
            { name: "요정족 사슬 갑옷", safe: 6, img: getLCImg(42), target: 'a', stackable: false, info: ["방어력: -5", "안전 인챈트: 6", "클래스: 요정"] },
            { name: "요정족 판금 갑옷", safe: 6, img: getLCImg(43), target: 'a', stackable: false, info: ["방어력: -6", "안전 인챈트: 6", "클래스: 요정"] },
            { name: "요정족 흉갑", safe: 6, img: getLCImg(44), target: 'a', stackable: false, info: ["방어력: -4", "안전 인챈트: 6", "클래스: 요정"] },
            { name: "판금 갑옷", safe: 4, img: getLCImg(35), target: 'a', stackable: false, info: ["방어력: -8", "안전 인챈트: 4", "클래스: 기사"] },
            { name: "수정 갑옷", safe: 4, img: getLCImg(34), target: 'a', stackable: false, info: ["방어력: -8", "안전 인챈트: 4", "클래스: 기사"] },
            { name: "강철 갑옷", safe: 4, img: getLCImg(33), target: 'a', stackable: false, info: ["방어력: -7", "안전 인챈트: 4", "클래스: 기사"] },
            { name: "신관의 로브", safe: 4, img: getLCImg(25), target: 'a', stackable: false, info: ["방어력: -6", "옵션: MP 회복 +5, MR +4", "안전 인챈트: 4"] },
            { name: "무관의 갑옷", safe: 4, img: getLCImg(36), target: 'a', stackable: false, info: ["방어력: -7", "옵션: HP 회복 +5, MR +4", "안전 인챈트: 4"] },
            { name: "지룡 비늘 갑옷", safe: 4, img: getLCImg(37), target: 'a', stackable: false, info: ["방어력: -9", "옵션: 땅저항 +50", "안전 인챈트: 4"] },
            { name: "화룡 비늘 갑옷", safe: 4, img: getLCImg(38), target: 'a', stackable: false, info: ["방어력: -9", "옵션: 불저항 +50", "안전 인챈트: 4"] },
            { name: "풍룡 비늘 갑옷", safe: 4, img: getLCImg(39), target: 'a', stackable: false, info: ["방어력: -9", "옵션: 바람저항 +50", "안전 인챈트: 4"] },
            { name: "수룡 비늘 갑옷", safe: 4, img: getLCImg(40), target: 'a', stackable: false, info: ["방어력: -9", "옵션: 물저항 +50", "안전 인챈트: 4"] }
        ],
        "주문서": [
            { name: "무기 마법 주문서", sType: 'n', target: 'w', img: getLCImg(154), stackable: true, info: ["무기를 강화한다.", "안전 인챈트 수치를 넘기면 소멸"] },
            { name: "축복받은 무기 마법 주문서", sType: 'b', target: 'w', img: getLCImg(155), stackable: true, info: ["무기를 강화한다.", "성공 시 1~3 수치가 무작위 상승"] },
            { name: "저주받은 무기 마법 주문서", sType: 'c', target: 'w', img: getLCImg(156), stackable: true, info: ["강화 수치를 1 하락시킨다.", "100% 성공"] },
            { name: "갑옷 마법 주문서", sType: 'n', target: 'a', img: getLCImg(157), stackable: true, info: ["방어구를 강화한다.", "안전 인챈트 수치를 넘기면 소멸"] },
            { name: "축복받은 갑옷 마법 주문서", sType: 'b', target: 'a', img: getLCImg(158), stackable: true, info: ["방어구를 강화한다.", "성공 시 1~3 수치가 무작위 상승"] },
            { name: "저주받은 갑옷 마법 주문서", sType: 'c', target: 'a', img: getLCImg(159), stackable: true, info: ["강화 수치를 1 하락시킨다.", "100% 성공"] }
        ]
    };

    let inv = Array(30).fill(null);
    let activeIdx = null;
    let dragIdx = null; 
    let pressTimer;
    const popup = document.getElementById('itemPopup');

    // ==========================================
    // 요청하신 신규 초기 지급 로직
    // 지정된 아이템 8개, 지정된 수량의 주문서만 셋팅됩니다.
    // ==========================================
    function initStartingItems() {
        let slotIndex = 0;
        
        // 장비 추가 헬퍼 함수
        const addEquipment = (itemName) => {
            let itemObj = db["무기"].find(i => i.name === itemName) || db["방어구"].find(i => i.name === itemName);
            if (itemObj && slotIndex < 30) {
                inv[slotIndex++] = { ...itemObj, lvl: 0, qty: 1 };
            }
        };

        // 주문서 추가 헬퍼 함수
        const addScroll = (itemName, quantity) => {
            let itemObj = db["주문서"].find(i => i.name === itemName);
            if (itemObj && slotIndex < 30) {
                inv[slotIndex++] = { ...itemObj, qty: quantity };
            }
        };

        // 1. 지정된 장비 지급
        addEquipment("싸울아비 장검");
        addEquipment("기사의 면갑");
        addEquipment("판금 갑옷");
        addEquipment("티셔츠");
        addEquipment("요정족 방패");
        addEquipment("강철 부츠");
        addEquipment("파워 글로브");
        addEquipment("보호 망토");

        // 2. 지정된 주문서 지급
        addScroll("무기 마법 주문서", 200);
        addScroll("갑옷 마법 주문서", 200);
        addScroll("축복받은 무기 마법 주문서", 50);
        addScroll("저주받은 무기 마법 주문서", 50);
        addScroll("축복받은 갑옷 마법 주문서", 50);
        addScroll("저주받은 갑옷 마법 주문서", 50);
    }

    // 접속 시 초기화 함수 실행
    initStartingItems();

    // --- [이하 기존 로직 100% 동일] ---
    function startPress(e, i) {
        if (!inv[i]) return;
        let cX = e.clientX || (e.touches && e.touches[0].clientX);
        let cY = e.clientY || (e.touches && e.touches[0].clientY);
        pressTimer = setTimeout(() => showPopup(i, cX, cY), 400);
    }
    function endPress() { clearTimeout(pressTimer); popup.style.display = 'none'; }
    function showPopup(i, x, y) {
        const item = inv[i]; if (!item) return;
        let lvlStr = item.lvl !== undefined && item.lvl !== null ? (item.lvl >= 0 ? `+${item.lvl} ` : `${item.lvl} `) : '';
        let html = `<div class="p-title">${lvlStr}${item.name}</div>`;
        if (item.info) item.info.forEach(line => html += `<div>${line}</div>`);
        popup.innerHTML = html; popup.style.display = 'block';
        let tX = x + 15, tY = y + 15;
        if (tX + popup.offsetWidth > window.innerWidth) tX = window.innerWidth - popup.offsetWidth - 10;
        if (tY + popup.offsetHeight > window.innerHeight) tY = window.innerHeight - popup.offsetHeight - 10;
        popup.style.left = tX + 'px'; popup.style.top = tY + 'px';
    }

    function updateList() { const t = document.getElementById('type').value; const s = document.getElementById('items'); s.innerHTML = db[t].map((v, i) => `<option value="${i}">${v.name}</option>`).join(''); }
    function give() { const t = document.getElementById('type').value, i = document.getElementById('items').value, a = parseInt(document.getElementById('amt').value), item = db[t][i]; if (item.stackable) { let existingIdx = inv.findIndex(s => s && s.name === item.name); if (existingIdx !== -1) inv[existingIdx].qty += a; else { let emptyIdx = inv.findIndex(s => s === null); if (emptyIdx !== -1) inv[emptyIdx] = { ...item, qty: a }; } } else { for(let k=0; k<a; k++) { let emptyIdx = inv.findIndex(s => s === null); if (emptyIdx !== -1) inv[emptyIdx] = { ...item, lvl: 0, qty: 1 }; } } draw(); }

    function draw() {
        const g = document.getElementById('grid');
        g.innerHTML = inv.map((item, i) => {
            const isSel = activeIdx === i ? 'active-scroll' : '';
            if(!item) return `<div class="slot" ondragover="allowDrop(event)" ondrop="drop(event, ${i})"></div>`;
            return `
                <div class="slot ${isSel}" draggable="true"
                     onclick="handleClick(${i})" ondblclick="handleDoubleClick(${i})"
                     onmousedown="startPress(event, ${i})" onmouseup="endPress()" onmouseleave="endPress()"
                     ontouchstart="startPress(event, ${i})" ontouchend="endPress()" ontouchcancel="endPress()"
                     ondragstart="dragStart(event, ${i}); endPress();" ondragover="allowDrop(event)"
                     ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="drop(event, ${i})">
                    <img src="${item.img}" onerror="this.style.display='none'">
                    ${item.lvl !== undefined && item.lvl !== null ? `<div class="lvl-text">${item.lvl >=0 ? '+'+item.lvl : item.lvl}</div>` : ''}
                    ${item.qty > 1 ? `<div class="count-text">${item.qty}</div>` : ''}
                </div>
            `;
        }).join(''); 
    }

    function dragStart(e, i) { if (activeIdx !== null) return; dragIdx = i; setTimeout(() => e.target.style.opacity = "0.5", 0); }
    function allowDrop(e) { e.preventDefault(); }
    function dragEnter(e) { e.preventDefault(); if (e.target.classList.contains('slot')) e.target.classList.add('drag-over'); }
    function dragLeave(e) { if (e.target.classList.contains('slot')) e.target.classList.remove('drag-over'); }
    function drop(e, targetIdx) { e.preventDefault(); if (e.target.classList.contains('slot')) e.target.classList.remove('drag-over'); const temp = inv[dragIdx]; inv[dragIdx] = inv[targetIdx]; inv[targetIdx] = temp; document.getElementById('soundDrop').play(); dragIdx = null; draw(); }
    function handleDoubleClick(i) { const item = inv[i]; if(item && item.stackable) { activeIdx = i; document.getElementById('b').classList.add('mode-target'); document.getElementById('status').innerHTML = `[${item.name}] 대상을 선택하십시오.`; draw(); } }
    function handleClick(i) { const item = inv[i]; if (activeIdx !== null) { if (activeIdx === i) { cancel(); return; } if (item && !item.stackable && item.target === inv[activeIdx].target) enchant(activeIdx, i); else { addLog("아무 일도 일어나지 않았습니다.", "s-fail"); cancel(); } } else if(item) { document.getElementById('status').innerText = (item.lvl !== undefined && item.lvl !== null ? (item.lvl >= 0 ? '+'+item.lvl+' ' : item.lvl+' ') : '') + item.name; } }

    function enchant(si, ti) {
        const scroll = inv[si];
        const target = inv[ti];
        
        let targetName = (target.lvl !== 0 && target.lvl !== null ? (target.lvl > 0 ? '+' + target.lvl + ' ' : target.lvl + ' ') : '') + target.name;
        
        if (scroll.sType === 'c') {
            target.lvl -= 1;
            addLog(`${targetName}이(가) 칠흑같이 검게 빛납니다.`, "s-cur");
        } else {
            const successRate = target.lvl < target.safe ? 1.0 : 0.33;
            if (Math.random() < successRate) {
                let up = 1;
                if (scroll.sType === 'b') {
                    if (target.lvl <= 2) up = Math.floor(Math.random()*3)+1;
                    else if (target.lvl <= 5) up = Math.floor(Math.random()*2)+1;
                }
                target.lvl += up;
                
                let lightMsg = "강렬하게 은빛으로 빛납니다.";
                if (target.lvl >= 9) lightMsg = "영롱하게 붉은빛을 냅니다.";
                else if (target.lvl >= 7) lightMsg = "강렬하게 푸른빛을 냅니다.";
                
                addLog(`${targetName}이(가) ${lightMsg}`, "s-suc");
            } else {
                addLog(`${targetName}이(가) 강렬하게 빛나더니 증발하여 사라졌습니다.`, "s-fail");
                inv[ti] = null;
            }
        }
        
        inv[si].qty -= 1;
        if (inv[si].qty <= 0) inv[si] = null;
        
        cancel();
    }

    function cancel() { activeIdx = null; document.getElementById('b').classList.remove('mode-target'); document.getElementById('status').innerText = "주문서를 더블클릭 하십시오."; draw(); }
    
    function addLog(msg, cls) { 
        const log = document.getElementById('log'); 
        const div = document.createElement('div'); 
        div.className = cls; 
        div.innerText = msg; 
        log.appendChild(div); 
        
        log.scrollTop = log.scrollHeight; 
    }

    document.getElementById('type').innerHTML = Object.keys(db).map(k => `<option>${k}</option>`).join('');
    updateList(); draw();
</script>
</body>
</html>
