<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lineage Classic Simulator</title>
    <style>
        /* 도트 감성 폰트 및 기본 스타일 */
        :root {
            --bg: #0c0d10;
            --panel: #2a2c31;
            --slot: #15171a;
            --border: #54565a;
            --gold: #e0bb40;
            --text: #c0c0c0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 상단 아이템 지급바 (Admin Panel) */
        .admin-panel {
            background: #1a1b1e;
            border: 2px solid var(--border);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            image-rendering: pixelated;
        }

        select, input, button {
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 0.9rem;
        }

        button {
            cursor: pointer;
            background: #3e4449;
            color: var(--gold);
            font-weight: bold;
        }

        button:hover { background: #4e5459; }

        /* 메인 게임 영역 */
        .game-area {
            display: flex;
            gap: 30px;
            image-rendering: pixelated;
        }

        /* 인벤토리 (Classic UI) */
        .inventory-wrapper {
            background: #34373c;
            border: 4px double var(--border);
            padding: 12px;
            box-shadow: inset 2px 2px 0 #4a4d53, inset -2px -2px 0 #1a1b1e;
        }

        .inventory-title {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 54px);
            grid-template-rows: repeat(6, 54px);
            gap: 4px;
            background: #1a1b1e;
            padding: 4px;
        }

        .slot {
            width: 54px;
            height: 54px;
            background: var(--slot);
            border: 1px solid #333;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slot:hover { border-color: #777; }
        .slot.selected-scroll { border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(224,187,64,0.5); }
        
        .slot img { width: 42px; height: 42px; image-rendering: auto; }
        .slot .lvl { position: absolute; top: 2px; left: 3px; font-weight: bold; font-size: 11px; color: #44ff44; text-shadow: 1px 1px 2px #000; }
        .slot .count { position: absolute; bottom: 2px; right: 3px; font-size: 10px; color: #fff; }

        /* 정보 및 로그 패널 */
        .info-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #status-msg {
            background: #000;
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--gold);
            font-size: 0.85rem;
            min-height: 45px;
            line-height: 1.4;
        }

        #log-window {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--border);
            padding: 10px;
            font-size: 0.8rem;
            overflow-y: auto;
            height: 250px;
            color: #999;
        }

        .log-success { color: #50fa7b; }
        .log-fail { color: #ff5555; }
        .log-system { color: #8be9fd; }

        body.target-mode { cursor: crosshair; }
    </style>
</head>
<body id="mainBody">

    <div class="admin-panel">
        <span>[지급]</span>
        <select id="giveType" onchange="updateGiveList()">
            <option value="weapon">무기</option>
            <option value="armor">방어구</option>
            <option value="scroll">주문서</option>
        </select>
        <select id="giveItem"></select>
        <input type="number" id="giveAmount" value="1" min="1" max="99" style="width: 40px;">
        <button onclick="giveItem()">아이템 확인</button>
    </div>

    <div class="game-area">
        <div class="inventory-wrapper">
            <div class="inventory-title">INVENTORY</div>
            <div class="inventory-grid" id="invGrid"></div>
        </div>

        <div class="info-panel">
            <div id="status-msg">아이템을 보급받아 강화를 시작하세요.</div>
            <div id="log-window"></div>
            <button onclick="location.reload()" style="background:#222; font-size: 0.7rem;">캐릭터 초기화</button>
        </div>
    </div>

<script>
    // --- 데이터 정의 ---
    const PROXY = "https://images.weserv.nl/?url=";
    const db = {
        weapon: [
            { name: "일본도", safe: 6, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/1.png" },
            { name: "레이피어", safe: 6, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/3.png" },
            { name: "싸울아비 장검", safe: 6, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/4.png" }
        ],
        armor: [
            { name: "판금 갑옷", safe: 4, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/35.png" },
            { name: "요정족 판금", safe: 6, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/43.png" },
            { name: "마법 망토", safe: 4, img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/115.png" }
        ],
        scroll: [
            { name: "무기 마법 주문서", type: "weapon-scroll", sType: "normal", img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/154.png" },
            { name: "축복받은 무기 마법 주문서", type: "weapon-scroll", sType: "blessed", img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/155.png" },
            { name: "갑옷 마법 주문서", type: "armor-scroll", sType: "normal", img: "https://static.inven.co.kr/image_2011/lineage/dataninfo/item/icon/157.png" }
        ]
    };

    let inventory = Array(24).fill(null);
    let activeScroll = null;

    // --- 초기화 및 지급 시스템 ---
    function updateGiveList() {
        const type = document.getElementById('giveType').value;
        const subSelect = document.getElementById('giveItem');
        subSelect.innerHTML = "";
        db[type].forEach((item, i) => {
            subSelect.innerHTML += `<option value="${i}">${item.name}</option>`;
        });
    }

    function giveItem() {
        const type = document.getElementById('giveType').value;
        const idx = document.getElementById('giveItem').value;
        const amt = parseInt(document.getElementById('giveAmount').value);
        const baseItem = db[type][idx];

        for(let i=0; i<amt; i++) {
            const emptyIdx = inventory.findIndex(s => s === null);
            if(emptyIdx === -1) { alert("인벤토리가 가득 찼습니다."); break; }
            
            inventory[emptyIdx] = { 
                ...baseItem, 
                id: Date.now() + Math.random(),
                lvl: type === 'scroll' ? undefined : 0,
                itemType: type 
            };
        }
        addLog(`${baseItem.name} ${amt}개를 지급받았습니다.`, "log-system");
        renderInventory();
    }

    // --- 인벤토리 렌더링 ---
    function renderInventory() {
        const grid = document.getElementById('invGrid');
        grid.innerHTML = "";

        inventory.forEach((item, idx) => {
            const slot = document.createElement('div');
            slot.className = `slot ${activeScroll && activeScroll.invIdx === idx ? 'selected-scroll' : ''}`;
            
            if(item) {
                const img = document.createElement('img');
                img.src = PROXY + item.img;
                slot.appendChild(img);

                if(item.lvl !== undefined) {
                    const lvl = document.createElement('div');
                    lvl.className = 'lvl';
                    lvl.innerText = `+${item.lvl}`;
                    slot.appendChild(lvl);
                }
                
                slot.onclick = () => handleSlotClick(idx);
            }
            grid.appendChild(slot);
        });
    }

    // --- 로직 컨트롤 ---
    function handleSlotClick(idx) {
        const clickedItem = inventory[idx];
        const status = document.getElementById('status-msg');

        // 1. 주문서 선택 상태에서 아이템 클릭
        if (activeScroll) {
            if (clickedItem.itemType === 'scroll') {
                activeScroll = null; // 주문서 다시 클릭 시 취소
                document.getElementById('mainBody').classList.remove('target-mode');
                status.innerText = "사용이 취소되었습니다.";
            } else {
                processEnchant(idx);
            }
        } 
        // 2. 새 주문서 선택
        else if (clickedItem.itemType === 'scroll') {
            activeScroll = { ...clickedItem, invIdx: idx };
            document.getElementById('mainBody').classList.add('target-mode');
            status.innerText = `[${clickedItem.name}]\n대상을 선택하세요.`;
        }
        renderInventory();
    }

    function processEnchant(targetIdx) {
        const scroll = inventory[activeScroll.invIdx];
        const target = inventory[targetIdx];

        // 타입 검증
        const isWeaponScroll = scroll.type === 'weapon-scroll' && target.itemType === 'weapon';
        const isArmorScroll = scroll.type === 'armor-scroll' && target.itemType === 'armor';

        if (!isWeaponScroll && !isArmorScroll) {
            addLog("주문서가 대상과 맞지 않습니다.", "log-fail");
        } else {
            // 확률 계산 (NC Classic 로직)
            const successRate = target.lvl < target.safe ? 1.0 : 0.33;
            
            if (Math.random() < successRate) {
                let up = 1;
                if (scroll.sType === 'blessed') {
                    if (target.lvl <= 2) up = Math.floor(Math.random()*3)+1;
                    else if (target.lvl <= 5) up = Math.floor(Math.random()*2)+1;
                }
                target.lvl += up;
                addLog(`성공: +${target.lvl} ${target.name} (상승:${up})`, "log-success");
            } else {
                addLog(`실패: +${target.lvl} ${target.name}이(가) 증발했습니다.`, "log-fail");
                inventory[targetIdx] = null;
            }
            // 주문서 소모
            inventory[activeScroll.invIdx] = null;
        }

        activeScroll = null;
        document.getElementById('mainBody').classList.remove('target-mode');
        document.getElementById('status-msg').innerText = "강화가 완료되었습니다.";
        renderInventory();
    }

    function addLog(msg, cls) {
        const log = document.getElementById('log-window');
        log.innerHTML = `<div class="${cls}">> ${msg}</div>` + log.innerHTML;
    }

    // 초기 로딩
    updateGiveList();
    renderInventory();
</script>
</body>
</html>
