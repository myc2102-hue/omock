<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강화 시뮬레이터 - Enchant Simulator</title>

    <meta name="description" content="본섭 확률 완벽 적용! 리니지 클래식 무기/방어구 인챈트(강화) 시뮬레이터입니다. +9검을 띄우고 전 서버 실시간 랭킹 1위에 도전하세요. 유저 실시간 채팅 지원.">
    <meta name="keywords" content="리니지, 리니지 클래식, 강화 시뮬레이터, 인챈트 시뮬레이터, 리니지 6검4셋, 데포로쥬, 러쉬, 무기 강화, 장비 강화, 엔씨소프트 팬게임, Lineage">
    <meta name="author" content="데포로쥬">
    <meta name="robots" content="index, follow"> 
    <link rel="canonical" href="https://myc2102-hue.github.io/omock/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://myc2102-hue.github.io/omock/">
    <meta property="og:site_name" content="강화 시뮬레이터">
    <meta property="og:title" content="⚔️ 리니지 강화 시뮬레이터 - 당신의 러쉬 운을 시험하세요!">
    <meta property="og:description" content="과연 당신의 운은? 6검 4셋부터 축주문서까지! 무기와 방어구를 강화하고 실시간 랭킹에 이름을 새겨보세요.">
    <meta property="og:image" content="https://www.transparenttextures.com/patterns/dirt.png"> 

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        }
        :root {
            --bg-stone: #626573; --border-light: #9ba0af; --border-dark: #2a2c33;
            --slot-bg: #22242a; --slot-circle: #2a2c33;
            --gold: #ffeb99; --green: #44ff44; --red: #ff5555; --blue: #66ccff; --pink: #ff77ff;
        }
        body {
            background: #2a2218 url('https://www.transparenttextures.com/patterns/dirt.png'); 
            font-family: 'DungGeunMo', 'Gulim', sans-serif;
            margin: 0; padding: 22px 11px; color: #ccc; user-select: none;
            display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box;
            font-size: 15.4px;
        }

        /* 로그인 오버레이 */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #loginBox { width: 420px; background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%); border: 2px solid #3a3530; border-radius: 6px; padding: 30px 35px; text-align: center; }
        .login-title { font-size: 26px; color: #c4a95a; letter-spacing: 4px; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 10px; background: #000; color: #c4a95a; border: 1px solid #3a3530; margin-bottom: 20px; text-align: center; font-family: 'DungGeunMo'; }
        .login-btn { padding: 10px 40px; background: #2a2520; color: #c4a95a; border: 1px solid #5a5040; cursor: pointer; font-family: 'DungGeunMo'; }

        /* 컨테이너 및 윈도우 */
        .app-container { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 15px; }
        .window { background: var(--bg-stone); border: 2px solid #000; box-shadow: inset 2px 2px 0px var(--border-light), inset -2px -2px 0px var(--border-dark); padding: 10px; border-radius: 5px; }
        .main-content { display: flex; gap: 15px; height: 550px; }
        
        /* 인벤토리 영역 */
        .inventory-window { width: 330px; display: flex; flex-direction: column; }
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #111; padding: 3px; overflow-y: auto; flex-grow: 1; }
        .slot { aspect-ratio: 1/1; background: var(--slot-bg); border: 1px solid #444; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .slot img { width: 80%; height: 80%; image-rendering: pixelated; }
        .lvl-text { position: absolute; top: 2px; left: 4px; color: var(--green); font-size: 14px; text-shadow: 1px 1px 0 #000; }
        .count-text { position: absolute; bottom: 2px; right: 4px; color: #fff; font-size: 12px; }
        .active-scroll { border: 2px solid var(--gold) !important; box-shadow: 0 0 10px var(--gold); }

        /* 퀵슬롯 */
        .quick-slots { display: flex; gap: 5px; margin-top: 10px; justify-content: center; background: #111; padding: 5px; }
        .q-slot { width: 50px; height: 50px; background: #222; border: 1px solid #444; position: relative; cursor: pointer; }
        .q-label { position: absolute; top: 2px; left: 2px; font-size: 10px; color: #888; }
        .q-content { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .q-content img { width: 70%; height: 70%; }

        /* 채팅 및 랭킹 영역 */
        .chat-window { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        #rankingBoard { background: #000; border: 1px solid #444; padding: 10px; height: 140px; overflow: hidden; }
        .rank-title { text-align: center; color: var(--gold); font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .rank-lists { display: flex; gap: 10px; height: 100px; }
        .rank-col { flex: 1; font-size: 11px; color: #aaa; overflow: hidden; }
        .rank-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .rank-1 { color: #ff5555; } .rank-2 { color: #ffaa00; } .rank-3 { color: #ffff55; }

        #log { flex-grow: 1; background: #000; border: 1px solid #444; padding: 10px; font-size: 14px; overflow-y: auto; color: #eee; line-height: 1.5; }
        .chat-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 8px; font-family: 'DungGeunMo'; box-sizing: border-box; }

        /* 로그 컬러 */
        .s-suc { color: var(--green); } .s-fail { color: var(--red); } .s-sys { color: var(--gold); } .s-cur { color: #aaa; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div id="loginBox">
            <div class="login-title">⚔️ 강화 시뮬레이터</div>
            <input type="text" id="usernameInput" class="login-input" placeholder="캐릭터명 입력" maxlength="10">
            <button onclick="joinServer()" class="login-btn">접 속 하 기</button>
        </div>
    </div>

    <div class="app-container">
        <div class="admin-bar window" style="display:flex; gap:10px; align-items:center;">
            <span style="color:var(--gold)">[SHOP]</span>
            <select id="type" onchange="updateList()"></select>
            <select id="items"></select>
            <input type="number" id="amt" value="1" style="width:50px; background:#000; color:#fff; border:1px solid #444;">
            <button onclick="give()" style="cursor:pointer">지급</button>
            <button onclick="location.reload()" style="cursor:pointer">새로고침</button>
        </div>

        <div class="main-content">
            <div class="inventory-window window">
                <div id="status" style="margin-bottom:5px; font-size:12px; color:var(--gold); text-align:center;">주문서를 더블클릭 하십시오.</div>
                <div class="inv-grid" id="grid"></div>
                <div class="quick-slots">
                    <div class="q-slot" onclick="clickQuickSlot('F5')" ondrop="dropQuick(event, 'F5')" ondragover="allowDrop(event)"><span class="q-label">F5</span><div id="q-content-F5" class="q-content"></div></div>
                    <div class="q-slot" onclick="clickQuickSlot('F6')" ondrop="dropQuick(event, 'F6')" ondragover="allowDrop(event)"><span class="q-label">F6</span><div id="q-content-F6" class="q-content"></div></div>
                    <div class="q-slot" onclick="clickQuickSlot('F7')" ondrop="dropQuick(event, 'F7')" ondragover="allowDrop(event)"><span class="q-label">F7</span><div id="q-content-F7" class="q-content"></div></div>
                    <div class="q-slot" onclick="clickQuickSlot('F8')" ondrop="dropQuick(event, 'F8')" ondragover="allowDrop(event)"><span class="q-label">F8</span><div id="q-content-F8" class="q-content"></div></div>
                </div>
            </div>

            <div class="chat-window window">
                <div id="rankingBoard">
                    <div class="rank-title">🏆 전서버 실시간 인챈트 랭킹 🏆</div>
                    <div class="rank-lists">
                        <div class="rank-col">
                            <div style="color:var(--gold); text-align:center; border-bottom:1px solid #222; margin-bottom:5px;">[ 무기 ]</div>
                            <div id="weaponRankList"></div>
                        </div>
                        <div class="rank-col">
                            <div style="color:var(--gold); text-align:center; border-bottom:1px solid #222; margin-bottom:5px;">[ 방어구 ]</div>
                            <div id="armorRankList"></div>
                        </div>
                    </div>
                </div>
                <div id="log"></div>
                <input type="text" id="chatInputBox" class="chat-input" placeholder="엔터를 눌러 채팅 (로그인 후 가능)" readonly>
            </div>
        </div>
    </div>

    <div id="ytPlayer" style="display:none"></div>

<script>
    // 1. 파이어베이스 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyBcNiClyycbiDyTNgABSMZUxy1Pub8Rezo",
        authDomain: "inchanchat.firebaseapp.com",
        projectId: "inchanchat",
        databaseURL: "https://inchanchat-default-rtdb.firebaseio.com",
        storageBucket: "inchanchat.firebasestorage.app",
        messagingSenderId: "519834039681",
        appId: "1:519834039681:web:90ff93ef38793429c76480"
    };
    firebase.initializeApp(firebaseConfig);
    const realDB = firebase.database();

    // 2. 아이템 데이터베이스 (backup.html 기준 안전수치 적용)
    const db = {
        "무기": [
            { name: "일본도", img: "https://lineage.plaync.com/ingame-items/api/items/1/image", target: "w", safe: 6 },
            { name: "레이피어", img: "https://lineage.plaync.com/ingame-items/api/items/2/image", target: "w", safe: 6 },
            { name: "싸울아비 장검", img: "https://lineage.plaync.com/ingame-items/api/items/3/image", target: "w", safe: 6 }
        ],
        "방어구": [
            { name: "판금 갑옷", img: "https://lineage.plaync.com/ingame-items/api/items/10/image", target: "a", safe: 4 },
            { name: "요정족 방패", img: "https://lineage.plaync.com/ingame-items/api/items/11/image", target: "a", safe: 6 },
            { name: "골무", img: "https://lineage.plaync.com/ingame-items/api/items/12/image", target: "a", safe: 4 },
            { name: "티셔츠", img: "https://lineage.plaync.com/ingame-items/api/items/13/image", target: "a", safe: 4 }
        ],
        "주문서": [
            { name: "무기 강화 주문서", img: "https://lineage.plaync.com/ingame-items/api/items/100/image", target: "w", stackable: true, sType: "n" },
            { name: "축복받은 무기 강화 주문서", img: "https://lineage.plaync.com/ingame-items/api/items/101/image", target: "w", stackable: true, sType: "b" },
            { name: "갑옷 마법 주문서", img: "https://lineage.plaync.com/ingame-items/api/items/102/image", target: "a", stackable: true, sType: "n" },
            { name: "축복받은 갑옷 마법 주문서", img: "https://lineage.plaync.com/ingame-items/api/items/103/image", target: "a", stackable: true, sType: "b" }
        ]
    };

    let myUserId = "익명";
    let inv = Array(60).fill(null);
    let quickSlots = { F5: null, F6: null, F7: null, F8: null };
    let activeIdx = null;

    // 3. 서버 접속 및 랭킹 수신
    function joinServer() {
        const nick = document.getElementById("usernameInput").value.trim();
        if(!nick) return alert("닉네임을 입력하세요.");
        myUserId = nick;
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("chatInputBox").readOnly = false;
        
        realDB.ref("chats").push({
            user: "시스템",
            message: `${myUserId} 님이 접속하였습니다.`,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        if(player && player.playVideo) player.playVideo();
    }

    realDB.ref("enchants").orderByChild("lvl").limitToLast(100).on("value", (snapshot) => {
        let records = [];
        snapshot.forEach(c => { let d = c.val(); d.user = d.user || "익명"; records.push(d); });
        records.sort((a,b) => b.lvl - a.lvl || b.timestamp - a.timestamp);
        
        const render = (el, data) => {
            el.innerHTML = data.length ? "" : "기록 없음";
            data.forEach((r, i) => {
                let cls = i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"";
                el.innerHTML += `<div class="rank-item ${cls}">${i+1}. +${r.lvl} ${r.item} [${r.user}]</div>`;
            });
        };
        render(document.getElementById("weaponRankList"), records.filter(r => r.type === 'w').slice(0, 5));
        render(document.getElementById("armorRankList"), records.filter(r => r.type === 'a').slice(0, 5));
    });

    // 4. 강화 로직 (Backup 확률 및 축복 무기 +1~3 상승 완벽 적용)
    function enchant(si, ti) {
        const scroll = inv[si];
        const target = inv[ti];
        let targetName = (target.lvl > 0 ? '+' + target.lvl + ' ' : '') + target.name;
        
        function getRate(item, scrollType) {
            const lvl = item.lvl;
            if (lvl < item.safe) return [100, 0, 0]; // 안전구간

            if (item.target === 'w') { // 무기
                if (scrollType === 'b') { // 축복 무기
                    const WB = { 6: [33.3, 0, 66.7], 7: [33.3, 0, 66.7], 8: [33.3, 0, 66.7], 9: [3.33, 30.0, 66.67] };
                    return WB[lvl] || [3.03, 30.30, 66.67];
                } else { // 일반 무기
                    const W = { 6: [33.3, 0, 66.7], 7: [33.3, 0, 66.7], 8: [33.3, 0, 66.7], 9: [0.98, 32.4, 66.7] };
                    return W[lvl] || [0.10, 5.0, 94.9];
                }
            } else { // 방어구
                let table = (item.safe >= 6) ? 
                    { 6:[16.67,0,83.33], 7:[14.29,0,85.71], 8:[12.5,0,87.5], 9:[0.3,10.8,88.9] } : 
                    { 4:[25,0,75], 5:[20,0,80], 6:[16.67,0,83.33], 7:[14.29,0,85.71], 8:[12.5,0,87.5], 9:[0.3,10.8,88.9] };
                if (scrollType === 'b' && lvl >= 9) return [3.33, 30.0, 66.67];
                return table[lvl] || [0.10, 5.0, 94.9];
            }
        }

        const [successRate, keepRate, destroyRate] = getRate(target, scroll.sType);
        const roll = Math.random() * 100;

        if (roll < successRate) {
            let up = 1;
            // 🔥 축복받은 주문서 랜덤 상승 로직
            if (scroll.sType === 'b') {
                if (target.lvl < target.safe) {
                    // 안전 수치 미만 구간: +1 ~ +3 랜덤
                    up = Math.floor(Math.random() * 3) + 1;
                } else {
                    // 안전 수치 이상 구간: 무기는 7강까지 +1~2, 그 외는 +1 고정
                    if (target.target === 'w' && target.lvl <= 7) up = Math.floor(Math.random() * 2) + 1;
                    else up = 1;
                }
            }
            target.lvl += up;
            addLog(`${targetName}이(가) 강렬하게 빛납니다. (+${up})`, "s-suc");
            realDB.ref("enchants").push({ user: myUserId, item: target.name, lvl: target.lvl, type: target.target, timestamp: firebase.database.ServerValue.TIMESTAMP });
        } else if (roll < successRate + keepRate) {
            addLog(`${targetName}이(가) 빛났지만 아무 일도 일어나지 않았습니다.`, "s-sys");
        } else {
            addLog(`${targetName}이(가) 증발했습니다.`, "s-fail");
            inv[ti] = null;
        }
        
        scroll.qty--;
        if (scroll.qty <= 0) inv[si] = null;
        cancel();
    }

    // 5. 인벤토리 및 퀵슬롯 유틸리티
    function give() {
        const type = document.getElementById('type').value;
        const idx = document.getElementById('items').value;
        const amt = parseInt(document.getElementById('amt').value);
        const item = JSON.parse(JSON.stringify(db[type][idx]));
        if(item.stackable) {
            let existing = inv.find(i => i && i.name === item.name);
            if(existing) existing.qty += amt;
            else { item.qty = amt; let empty = inv.indexOf(null); if(empty!==-1) inv[empty] = item; }
        } else {
            for(let i=0; i<amt; i++) {
                let empty = inv.indexOf(null);
                if(empty!==-1) {
                    let newItem = JSON.parse(JSON.stringify(item));
                    newItem.lvl = 0;
                    inv[empty] = newItem;
                }
            }
        }
        draw();
    }

    function draw() {
        const grid = document.getElementById('grid');
        grid.innerHTML = inv.map((it, i) => {
            const active = activeIdx === i ? 'active-scroll' : '';
            if(!it) return `<div class="slot" ondrop="dropItem(${i})" ondragover="allowDrop(event)"></div>`;
            return `
                <div class="slot ${active}" draggable="true" ondragstart="dragIdx=${i}" ondrop="dropItem(${i})" ondragover="allowDrop(event)" onclick="handleClick(${i})" ondblclick="handleDoubleClick(${i})">
                    <img src="${it.img}">
                    ${it.lvl !== undefined ? `<div class="lvl-text">+${it.lvl}</div>` : ''}
                    ${it.qty > 1 ? `<div class="count-text">${it.qty}</div>` : ''}
                </div>`;
        }).join('');
        updateQuickUI();
    }

    let dragIdx = null;
    function allowDrop(e) { e.preventDefault(); }
    function dropItem(to) {
        if(dragIdx === null) return;
        let temp = inv[dragIdx];
        inv[dragIdx] = inv[to];
        inv[to] = temp;
        dragIdx = null;
        draw();
    }

    function handleClick(i) {
        if (activeIdx !== null) {
            if (activeIdx === i) return cancel();
            if (inv[i] && !inv[i].stackable && inv[i].target === inv[activeIdx].target) enchant(activeIdx, i);
            else cancel();
        }
    }

    function handleDoubleClick(i) {
        if (inv[i] && inv[i].stackable) {
            activeIdx = i;
            document.getElementById('status').innerText = `[${inv[i].name}] 사용 대상 선택`;
            draw();
        }
    }

    function cancel() {
        activeIdx = null;
        document.getElementById('status').innerText = "주문서를 더블클릭 하십시오.";
        draw();
    }

    function addLog(m, c) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = c; d.innerText = m;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    // 퀵슬롯 로직
    function dropQuick(e, key) {
        e.preventDefault();
        if(dragIdx === null || !inv[dragIdx]) return;
        quickSlots[key] = inv[dragIdx].name;
        updateQuickUI();
    }

    function updateQuickUI() {
        for(let key in quickSlots) {
            const el = document.getElementById(`q-content-${key}`);
            const itemName = quickSlots[key];
            if(itemName) {
                const item = Object.values(db).flat().find(it => it.name === itemName);
                el.innerHTML = `<img src="${item.img}">`;
            } else el.innerHTML = "";
        }
    }

    function clickQuickSlot(key) {
        const name = quickSlots[key];
        if(!name) return;
        const idx = inv.findIndex(it => it && it.name === name);
        if(idx !== -1) handleDoubleClick(idx);
    }

    window.addEventListener('keydown', (e) => {
        if(['F5','F6','F7','F8'].includes(e.key)) {
            e.preventDefault();
            clickQuickSlot(e.key);
        }
    });

    // 상점 초기화
    function updateList() {
        const t = document.getElementById('type').value;
        document.getElementById('items').innerHTML = db[t].map((it, i) => `<option value="${i}">${it.name}</option>`).join('');
    }
    document.getElementById('type').innerHTML = Object.keys(db).map(k => `<option>${k}</option>`).join('');
    updateList(); draw();

    // 유튜브 API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytPlayer', {
            height: '0', width: '0', videoId: 'pDJk7Lt0wxE',
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'pDJk7Lt0wxE' },
            events: { 'onReady': (e) => e.target.setVolume(20) }
        });
    }
</script>
</body>
</html>
