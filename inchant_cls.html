<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage Classic - Real Chat UI</title>
    <style>
        /* 1. 클래식 픽셀 폰트 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        }

        :root {
            --bg-stone: #626573;
            --border-light: #9ba0af;
            --border-dark: #2a2c33;
            --slot-bg: #22242a;
            --slot-circle: #2a2c33;
            
            --gold: #ffeb99; --green: #44ff44; --red: #ff5555; --blue: #66ccff; --pink: #ff77ff;
        }

        body {
            background: #2a2218 url('https://www.transparenttextures.com/patterns/dirt.png'); 
            font-family: 'DungGeunMo', 'Gulim', sans-serif;
            margin: 0; padding: 20px 10px;
            color: #ccc; user-select: none;
            display: flex; justify-content: center;
            min-height: 100vh; box-sizing: border-box;
        }

        /* 2. 전체 래퍼 (기본 880px, 중앙 정렬) */
        .app-container {
            width: 100%;
            max-width: 880px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 공통 창 프레임 (입체 돌 질감) */
        .window {
            background: var(--bg-stone);
            box-shadow: 
                inset 1px 1px 0px #b2b6c7, inset -1px -1px 0px #111,
                inset 2px 2px 0px var(--border-light), inset -2px -2px 0px var(--border-dark),
                5px 5px 15px rgba(0,0,0,0.8);
            border-radius: 8px; padding: 12px;
            color: #fff; text-shadow: 1px 1px 0 #000;
        }

        /* 3. 상단 아이템 보급창 */
        .admin-bar {
            display: flex; gap: 10px; align-items: center; justify-content: space-between;
            background: linear-gradient(135deg, #2b2e33, #15171a);
        }
        .admin-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        select, input, button { background: #111; color: #fff; border: 1px solid #555; padding: 6px; font-family: inherit; font-size: 14px; }
        button { cursor: pointer; color: var(--gold); background: #222; }
        button:hover { background: #333; }

        /* 4. 메인 콘텐츠 (좌측: 인벤토리 / 우측: 채팅창) */
        .main-content {
            display: flex; gap: 20px; align-items: stretch;
        }

        /* 좌측: 인벤토리 */
        .inventory-window {
            flex-shrink: 0;
            width: 300px;
            display: flex; flex-direction: column;
        }
        
        #status { font-size: 13px; color: var(--gold); text-align: center; margin-bottom: 5px; height: 15px; }

        .inv-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px;
            background: var(--border-dark); padding: 3px;
            border-top: 1px solid #111; border-left: 1px solid #111;
            border-bottom: 1px solid #999; border-right: 1px solid #999;
        }

        .slot {
            aspect-ratio: 1 / 1; 
            background: var(--slot-bg);
            background-image: radial-gradient(circle, var(--slot-circle) 35%, transparent 40%);
            border-top: 2px solid #0a0b0c; border-left: 2px solid #0a0b0c;
            border-bottom: 2px solid #484b55; border-right: 2px solid #484b55;
            position: relative; display: flex; justify-content: center; align-items: center; cursor: grab;
        }
        .slot:active { cursor: grabbing; }
        .slot img { width: 75%; height: 75%; object-fit: contain; image-rendering: pixelated; pointer-events: none; }
        .slot:hover { border-color: #888; }
        
        .slot.active-scroll { border: 2px solid var(--gold); box-shadow: inset 0 0 10px rgba(255,235,153,0.3); }
        .slot.drag-over { border: 2px dashed #8be9fd; opacity: 0.7; }
        body.mode-target .slot { cursor: crosshair; }

        .lvl-text { position: absolute; top: 2px; left: 4px; color: var(--green); font-size: 14px; text-shadow: 1px 1px 0 #000; z-index: 10; pointer-events: none; }
        .count-text { position: absolute; bottom: 2px; right: 4px; color: #fff; font-size: 12px; text-shadow: 1px 1px 0 #000; z-index: 10; pointer-events: none; }
        .item-label { position: absolute; font-size: 9px; color: #555; text-align: center; pointer-events: none; letter-spacing: -1px; }

        /* ==========================================
           새로 디벨롭된 리니지 클래식 채팅창 UI
           ========================================== */
        .chat-window {
            flex-grow: 1; display: flex; flex-direction: column;
            background: var(--bg-stone);
            padding: 12px; gap: 4px;
        }

        /* 채팅 탭 영역 */
        .chat-tabs {
            display: flex; gap: 2px; margin-bottom: 2px;
        }
        .chat-tab {
            background: linear-gradient(to bottom, #5d6166, #2a2c33);
            border: 1px solid #111; border-top: 1px solid #9ba0af; border-left: 1px solid #9ba0af;
            padding: 4px 12px; font-size: 12px; color: #aaa; cursor: pointer;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
        }
        .chat-tab.active {
            background: #000; color: var(--gold);
            border-bottom: 1px solid #000; /* 배경과 이어지는 느낌 */
        }

        /* 실제 로그창 영역 (음각) */
        #log {
            flex-grow: 1; padding: 10px; font-size: 14px; line-height: 1.6;
            overflow-y: auto; text-shadow: 1px 1px 0 #000; min-height: 300px;
            background: #000;
            border-top: 2px solid #050505; border-left: 2px solid #050505;
            border-bottom: 2px solid #444; border-right: 2px solid #444;
        }

        /* 커스텀 스크롤바 (리니지 스타일) */
        #log::-webkit-scrollbar { width: 16px; }
        #log::-webkit-scrollbar-track { background: #111; border-left: 1px solid #333; }
        #log::-webkit-scrollbar-thumb { 
            background: #3a3d42; 
            border-top: 2px solid #666; border-left: 2px solid #666;
            border-bottom: 2px solid #000; border-right: 2px solid #000;
        }
        #log::-webkit-scrollbar-thumb:active { background: #222; }

        /* 채팅 입력란 (하단) */
        .chat-input-wrapper {
            display: flex; align-items: center; background: #000;
            border-top: 2px solid #050505; border-left: 2px solid #050505;
            border-bottom: 2px solid #444; border-right: 2px solid #444;
            padding: 2px; margin-top: 2px;
        }
        .chat-type-label {
            color: #aaa; font-size: 13px; padding: 0 8px; border-right: 1px solid #333;
        }
        .chat-input {
            flex-grow: 1; background: transparent; border: none; color: #fff;
            padding: 6px 8px; font-family: inherit; font-size: 14px; outline: none; text-shadow: 1px 1px 0 #000;
        }

        .s-suc { color: var(--green); } .s-fail { color: var(--red); } .s-cur { color: var(--blue); } .s-sys { color: var(--gold); }

        /* ==========================================
           5. 반응형 (Responsive) - 430px 이하
           ========================================== */
        @media (max-width: 430px) {
            body { padding: 10px; }
            .app-container { gap: 10px; }
            
            .admin-bar { flex-direction: column; align-items: stretch; }
            .admin-controls { flex-direction: column; align-items: stretch; }
            .admin-controls select, .admin-controls input, .admin-controls button { width: 100%; box-sizing: border-box; }
            
            .main-content { flex-direction: column; gap: 10px; }
            .inventory-window { width: 100%; }
            .chat-window { height: 350px; }
            #log { min-height: 200px; }
        }
    </style>
</head>
<body id="b">

    <audio id="soundDrop" src="https://actions.google.com/sounds/v1/foley/drop_leather.ogg"></audio>

    <div class="app-container">
        <div class="admin-bar window">
            <span style="color:var(--gold); font-weight:bold;">[ITEM SHOP]</span>
            <div class="admin-controls">
                <select id="type" onchange="updateList()"></select>
                <select id="items"></select>
                <input type="number" id="amt" value="1" min="1" max="99" placeholder="수량">
                <button onclick="give()">지급</button>
                <button onclick="location.reload()">초기화</button>
            </div>
        </div>

        <div class="main-content">
            <div class="inventory-window window">
                <div id="status">주문서를 더블클릭 하십시오.</div>
                <div class="inv-grid" id="grid"></div>
            </div>

            <div class="chat-window window">
                <div class="chat-tabs">
                    <div class="chat-tab active">전체</div>
                    <div class="chat-tab">혈맹</div>
                    <div class="chat-tab">파티</div>
                    <div class="chat-tab">장사</div>
                </div>
                
                <div id="log">
                    <div class="s-sys">도움말을 보려면 CTRL-H 를 눌러 주십시오.</div>
                    <div class="s-sys">게임마스터는 고객님께 개인 정보(비밀번호 등)를 절대 묻지 않습니다.</div>
                    <div style="color:#aaa;">테스트 서버에 오신 것을 환영합니다!</div>
                </div>

                <div class="chat-input-wrapper">
                    <span class="chat-type-label">일반</span>
                    <input type="text" class="chat-input" placeholder="엔터키를 눌러 채팅을 입력할 수 없습니다." readonly>
                </div>
            </div>
        </div>
    </div>

<script>
    // 기존 기능 및 로직 100% 동일 유지
    const getLCImg = (path) => `https://images.weserv.nl/?url=https://www.lcinfo.io${path}`;

    const db = {
        "무기": [
            { name: "싸울아비 장검", safe: 6, img: getLCImg("/static/images/items/4.png"), target: 'w', stackable: false },
            { name: "레이피어", safe: 6, img: getLCImg("/static/images/items/3.png"), target: 'w', stackable: false }
        ],
        "방어구": [
            { name: "판금 갑옷", safe: 4, img: getLCImg("/static/images/items/35.png"), target: 'a', stackable: false },
            { name: "마법 망토", safe: 4, img: getLCImg("/static/images/items/115.png"), target: 'a', stackable: false }
        ],
        "주문서": [
            { name: "무기 마법 주문서", sType: 'n', target: 'w', img: getLCImg("/static/images/items/154.png"), stackable: true },
            { name: "축복받은 무기 마법 주문서", sType: 'b', target: 'w', img: getLCImg("/static/images/items/155.png"), stackable: true },
            { name: "저주받은 무기 마법 주문서", sType: 'c', target: 'w', img: getLCImg("/static/images/items/156.png"), stackable: true },
            { name: "갑옷 마법 주문서", sType: 'n', target: 'a', img: getLCImg("/static/images/items/157.png"), stackable: true },
            { name: "축복받은 갑옷 마법 주문서", sType: 'b', target: 'a', img: getLCImg("/static/images/items/158.png"), stackable: true },
            { name: "저주받은 갑옷 마법 주문서", sType: 'c', target: 'a', img: getLCImg("/static/images/items/159.png"), stackable: true }
        ]
    };

    let inv = Array(30).fill(null);
    let activeIdx = null;
    let dragIdx = null; 

    function updateList() {
        const t = document.getElementById('type').value;
        const s = document.getElementById('items');
        s.innerHTML = db[t].map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }

    function give() {
        const t = document.getElementById('type').value;
        const i = document.getElementById('items').value;
        const a = parseInt(document.getElementById('amt').value);
        const item = db[t][i];

        if (item.stackable) {
            let existingIdx = inv.findIndex(s => s && s.name === item.name);
            if (existingIdx !== -1) {
                inv[existingIdx].qty += a;
            } else {
                let emptyIdx = inv.findIndex(s => s === null);
                if (emptyIdx !== -1) inv[emptyIdx] = { ...item, qty: a };
            }
        } else {
            for(let k=0; k<a; k++) {
                let emptyIdx = inv.findIndex(s => s === null);
                if (emptyIdx !== -1) inv[emptyIdx] = { ...item, lvl: 0, qty: 1 };
            }
        }
        draw();
    }

    function draw() {
        const g = document.getElementById('grid');
        g.innerHTML = inv.map((item, i) => {
            const isSel = activeIdx === i ? 'active-scroll' : '';
            if(!item) return `<div class="slot" ondragover="allowDrop(event)" ondrop="drop(event, ${i})"></div>`;
            
            return `
                <div class="slot ${isSel}" draggable="true"
                     onclick="handleClick(${i})" ondblclick="handleDoubleClick(${i})"
                     ondragstart="dragStart(event, ${i})" ondragover="allowDrop(event)"
                     ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="drop(event, ${i})">
                    <span class="item-label">${item.name.substring(0,2)}</span>
                    <img src="${item.img}" onerror="this.style.display='none'">
                    ${item.lvl !== undefined && item.lvl !== null ? `<div class="lvl-text">${item.lvl >=0 ? '+'+item.lvl : item.lvl}</div>` : ''}
                    ${item.qty > 1 ? `<div class="count-text">${item.qty}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function dragStart(e, i) { if (activeIdx !== null) return; dragIdx = i; setTimeout(() => e.target.style.opacity = "0.5", 0); }
    function allowDrop(e) { e.preventDefault(); }
    function dragEnter(e) { e.preventDefault(); if (e.target.classList.contains('slot')) e.target.classList.add('drag-over'); }
    function dragLeave(e) { if (e.target.classList.contains('slot')) e.target.classList.remove('drag-over'); }
    function drop(e, targetIdx) {
        e.preventDefault();
        if (e.target.classList.contains('slot')) e.target.classList.remove('drag-over');
        const temp = inv[dragIdx];
        inv[dragIdx] = inv[targetIdx];
        inv[targetIdx] = temp;
        document.getElementById('soundDrop').play();
        dragIdx = null; draw();
    }

    function handleDoubleClick(i) {
        const item = inv[i];
        if(item && item.stackable) {
            activeIdx = i;
            document.getElementById('b').classList.add('mode-target');
            document.getElementById('status').innerHTML = `[${item.name}] 대상을 선택하십시오.`;
            draw();
        }
    }

    function handleClick(i) {
        const item = inv[i];
        if (activeIdx !== null) {
            if (activeIdx === i) { cancel(); return; }
            if (item && !item.stackable && item.target === inv[activeIdx].target) {
                enchant(activeIdx, i);
            } else {
                addLog("아무 일도 일어나지 않았습니다.", "s-fail");
                cancel();
            }
        } else if(item) {
            document.getElementById('status').innerText = (item.lvl !== undefined ? '+'+item.lvl+' ' : '') + item.name;
        }
    }

    function enchant(si, ti) {
        const scroll = inv[si];
        const target = inv[ti];
        
        if (scroll.sType === 'c') {
            target.lvl -= 1;
            addLog(`저주받은 기운이 깃들어 +${target.lvl} ${target.name}이(가) 되었습니다.`, "s-cur");
        } else {
            const successRate = target.lvl < target.safe ? 1.0 : 0.33;
            if (Math.random() < successRate) {
                let up = 1;
                if (scroll.sType === 'b') {
                    if (target.lvl <= 2) up = Math.floor(Math.random()*3)+1;
                    else if (target.lvl <= 5) up = Math.floor(Math.random()*2)+1;
                }
                target.lvl += up;
                addLog(`+${target.lvl} ${target.name}이(가) 강렬하게 빛납니다. (상승:${up})`, "s-suc");
            } else {
                addLog(`콰광! +${target.lvl} ${target.name}이(가) 증발하여 사라졌습니다.`, "s-fail");
                inv[ti] = null;
            }
        }
        
        inv[si].qty -= 1;
        if (inv[si].qty <= 0) inv[si] = null;
        
        cancel();
    }

    function cancel() {
        activeIdx = null; document.getElementById('b').classList.remove('mode-target');
        document.getElementById('status').innerText = "주문서를 더블클릭 하십시오.";
        draw();
    }

    function addLog(msg, cls) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = cls;
        div.innerText = msg;
        log.appendChild(div);
        
        log.scrollTop = log.scrollHeight;
    }

    document.getElementById('type').innerHTML = Object.keys(db).map(k => `<option>${k}</option>`).join('');
    updateList(); draw();
</script>
</body>
</html>
